categories:
  # ── Developer failures: compilation, linking, dependencies, code quality ───
  DEV_FAILURE:
    priority: 10
    thresholds:
      regex_min: 0.55
      semantic_min: 0.35
    patterns:
      # Build / compilation
      - 'compilation\s+failed'
      - 'compile\s+error'
      - 'linker\s+error'
      - 'undefined\s+reference'
      - 'undefined\s+symbol'
      - 'undefined\s+function'
      - 'undefined\s+macro'
      - 'preprocessor:'
      - 'macro\s+.*assuming\s+0'
      - '\bsyntax\s+error\b'
      - 'build\s+failed'
      - 'make\s+failed'
      - 'gradle\s+build\s+failed'
      - 'maven\s+build\s+failed'
      - '\bfatal\s+error\b'
      - '\bcompilation\s+terminated\b'
      - '\bno\s+such\s+file\s+or\s+directory\b'
      - '\bopening\s+dependency\s+file\b'
      - '\bmake:\s+\*\*\*'
      - '\bmingw32-make:\s+\*\*\*'
      - '\bgcc:\s+(error|fatal)'
      - '\bclang:\s+(error|fatal)'
      - '\bld:\s+cannot'
      - '\bld:\s+undefined'
      - 'error:\s+cannot\s+open\s+include\s+file'
      # Dependencies
      - 'could\s+not\s+resolve\s+depend'
      - 'dependency\s+resolution\s+failed'
      - 'failed\s+to\s+resolve\s+depend'
      - 'no\s+matching\s+distribution\s+found'
      - 'npm\s+err.*404'
      - 'package\s+not\s+found'
      - 'module\s+not\s+found'
      - 'cannot\s+resolve\s+import'
      - 'unresolved\s+(import|dependency)'
      - 'library\s+not\s+found\s+for'
      - 'could\s+not\s+find\s+artifact'
      - 'missing\s+(dependency|package|module|library)'
      - 'failed\s+to\s+download\s+(artifact|package|dependency)'
      - 'version\s+(conflict|mismatch|incompatib)'
      - 'incompatible\s+(version|dependency)'
      - '^go:\s+.*@.*:\s+reading'
      # Code quality
      - 'quality\s+gate.*failed'
      - 'quality\s+gate\s+status.*failed'
      - 'failed\s+quality\s+gate'
      - 'coverage\s+is\s+less\s+than'
      - 'new\s+code\s+coverage.*below'
      - 'quality\s+gate\s+condition.*failed'
      - 'code\s+coverage.*below.*threshold'
      - 'static\s+analysis\s+failed'
      - 'linting\s+failed'
      - '\d+\s+(blocker|critical)\s+issues?\s+found'
      - 'pending\s+identifications?'
      - 'files?\s+pending\s+for\s+identification'
      - 'setting\s+stage\s+to\s+failure\s+because\s+of\s+pending\s+findings'

  # ── Test failures ──────────────────────────────────────────────────────────
  TEST_FAILURE:
    priority: 20
    thresholds:
      regex_min: 0.55
      semantic_min: 0.35
    patterns:
      - 'tests?\s+failed'
      - 'assert(ion)?\s+failed'
      - '\d+\s+tests?\s+failed'
      - '\bjunit\b'
      - '\bpytest\b'
      - '\btestng\b'
      - 'test\s+execution\s+failed'
      - '\bfailures\b.*\berrors\b'
      - 'test\s+suite\s+failed'

  # ── CI/CD + Infrastructure: pipeline, config, artifacts, platform, network ─
  CI_INFRA_FAILURE:
    priority: 30
    thresholds:
      regex_min: 0.50
      semantic_min: 0.30
    patterns:
      # Pipeline / workflow
      - 'pipeline\s+syntax\s+error'
      - 'invalid\s+pipeline'
      - 'failed\s+to\s+(parse|load)\s+pipeline'
      - 'jenkinsfile\s+error'
      - 'workflow\s+syntax\s+error'
      - 'yaml\s+syntax\s+error'
      - 'mapping\s+values\s+are\s+not\s+allowed'
      - 'did\s+not\s+find\s+expected\s+key'
      - 'while\s+parsing\s+a\s+block'
      - 'groovy\s+compilation\s+error'
      - 'script\s+returned\s+exit\s+code\s+1.*pipeline'
      - 'org\.jenkinsci\.plugins\.workflow'
      - 'no\s+such\s+dsl\s+method'
      - 'workflow\s+script\s+error'
      - 'invalid\s+workflow\s+file'
      - 'jobs\.\w+\.\w+\s+is\s+not\s+a\s+mapping'
      - 'pipeline\s+execution\s+failed\s+before'
      - 'no\s+stages\s+defined\s+in\s+pipeline'
      - 'expected\s+a\s+step'
      - 'failed\s+to\s+retrieve\s+workflow'
      # Env / config / credentials / secrets
      - 'environment\s+variable\s+\S+\s+(is\s+)?not\s+set'
      - 'required\s+(env\s+var|environment\s+variable)\s+missing'
      - 'missing\s+required\s+(configuration|config|env)'
      - '\bcredentials?\s+not\s+found\b'
      - '\bsecret\s+not\s+found\b'
      - '\btoken\s+not\s+(set|found|configured)\b'
      - '\bapi[\s_]?key\s+not\s+(set|found)\b'
      - 'configuration\s+(file\s+)?not\s+found'
      - 'config\s+error'
      - 'failed\s+to\s+load\s+(settings|config|configuration)'
      - '\bunauthorized\b.*\b(token|credential|key|secret)\b'
      - '\bauthentication\s+failed\b'
      - '\bpermission\s+denied\b.*\b(secret|credential|token)\b'
      - 'http.?401.*\b(auth|token|credential)\b'
      - 'http.?403.*\b(auth|token|credential)\b'
      - '\baccess\s+rights?\b'
      - 'scanner.*authentication\s+failed'
      - 'failed\s+to\s+execute\s+(scanner|analysis)'
      - 'analysis\s+server.*http.?401'
      # Artifacts / registry
      - 'no\s+artifacts?\s+found'
      - 'failed\s+to\s+archive'
      - '0\s+artifacts?\s+archived'
      - 'no\s+files\s+to\s+upload'
      - 'artifact.*not\s+found'
      - 'failed\s+to\s+publish'
      - 'failed\s+to\s+deploy\s+(artifact|package|image)'
      - 'upload\s+failed'
      - 'maven\s+deploy\s+failed'
      - 'docker\s+push\s+failed'
      - 'registry.*push.*failed'
      - 'nexus.*failed'
      - 'could\s+not\s+transfer\s+artifact'
      # Docker / container
      - 'docker\s+build\s+failed'
      - 'error\s+building\s+image'
      - '\bdockerfile\s+error\b'
      - 'error\s+response\s+from\s+daemon'
      - 'pull\s+access\s+denied'
      - 'manifest\s+unknown'
      - 'failed\s+to\s+pull\s+image'
      - 'cannot\s+pull\s+image'
      - '\bimage\s+not\s+found\b'
      - 'container\s+exited\s+with\s+(non-zero\s+)?code'
      - 'oci\s+runtime\s+error'
      - 'failed\s+to\s+create\s+container'
      - 'docker\s+run\s+failed'
      - '\bdocker:\s+error\b'
      - '\bno\s+such\s+image\b'
      - 'cannot\s+connect\s+to\s+the\s+docker\s+daemon'
      # Kubernetes / orchestration
      - '\bcrashloopbackoff\b'
      - '\bimagepullbackoff\b'
      - '\berrimagepull\b'
      - 'pod\s+scheduling\s+failed'
      - 'insufficient\s+(memory|cpu|resources)'
      - '\boomkilled\b'
      - 'kubectl.*error'
      - 'deployment.*failed'
      - 'readiness\s+probe\s+failed'
      - 'liveness\s+probe\s+failed'
      - 'node\s+(is\s+)?not\s+ready'
      - 'pod\s+(is\s+)?evicted'
      - '\bunschedulable\b'
      - 'configmap\s+\S+\s+not\s+found'
      - 'secret\s+\S+\s+not\s+found'
      - 'failed\s+to\s+mount'
      - 'container\s+failed\s+to\s+start'
      - 'back-off\s+restarting\s+failed\s+container'
      # Network / connectivity
      - 'connection\s+refused'
      - 'connection\s+timed?\s+out'
      - 'network\s+error'
      - 'dns\s+resolution\s+failed'
      - '\bno\s+route\s+to\s+host\b'
      - 'host\s+unreachable'
      - 'failed\s+to\s+connect\s+to\s+\S+'
      - 'socket\s+(timeout|timed?\s+out)'
      - 'name\s+or\s+service\s+not\s+known'
      - 'temporary\s+failure\s+in\s+name\s+resolution'
      - 'http.?5\d\d'
      # Resources (OOM, disk, CPU)
      - 'out\s+of\s+memory'
      - '\boom\b'
      - '\bkilled\b'
      - '\bsegfault\b'
      - 'no\s+space\s+left\s+on\s+device'
      - 'disk\s+quota\s+exceeded'
      - 'process\s+exceeded\s+memory\s+limit'
      - 'java\.lang\.OutOfMemoryError'
      - 'GC\s+overhead\s+limit\s+exceeded'
      - 'heap\s+space\s+exhausted'
      - 'cpu\s+limit\s+exceeded'
      - 'cannot\s+allocate\s+memory'
      # Agent / runner / executor
      - 'node\s+is\s+offline'
      - 'agent\s+is\s+offline'
      - '\brunner\s+offline\b'
      - 'cannot\s+contact\s+node'
      - 'connection\s+to\s+agent\s+lost'
      - 'channel\s+closed'
      - 'jenkins\s+agent\s+terminated'
      - 'executor\s+lost'
      - 'runner\s+has\s+stopped'
      - '\[InfluxDB\s+(P|p)lugin\].*Ignoring\s+Exception'
      - '\[InfluxDB\s+(P|p)lugin\].*connection\s+refused'
      - '\[InfluxDB\s+(P|p)lugin\].*timed?\s+out'
      - '\[InfluxDB\s+(P|p)lugin\].*network\s+error'
      - '\[InfluxDB\s+(P|p)lugin\].*failed\s+to\s+connect'
      - '\[InfluxDB\s+(P|p)lugin\].*unable\s+to\s+write'
      - '\[InfluxDB\s+(P|p)lugin\].*http.?5\d\d'